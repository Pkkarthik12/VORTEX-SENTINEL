version: '3'

services:

  backend:
    image: python:3.11
    working_dir: /app
    volumes:
      - ../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: npm run dev
    ports:
      - "3000:3000"